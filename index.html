                    <div class="share-menu" id="share-menu">
                        <a href="#" class="share-menu-item whatsapp" onclick="shareViaWhatsApp(event)">
                            <i class="bi bi-whatsapp"></i>
                            <span id="share-whatsapp-label">WhatsApp</span>
                        </a>
                        <a href="#" class="share-menu-item email" onclick="shareViaEmail(event)">
                            <i class="bi bi-envelope"></i>
                            <span id="share-email-label">Email</span>
                        </a>
                        <a href="#" class="share-menu-item linkedin" onclick="shareViaLinkedIn(event)">
                            <i class="bi bi-linkedin"></i>
                            <span id="share-linkedin-label">LinkedIn</span>
                        </a>
                    </div>
                </div>
                <button class="print-button" onclick="window.print()" id="print-button-title">
                    <i class="bi bi-printer"></i>
                </button>
            </div>
        </div>
    </div>
    
    <div class="resume-wrapper">
        <div class="resume-header">
            <img id="profile-image" src="marcelo.png" alt="Marcelo Mourao" class="profile-image">
            <h1 id="name">Marcelo Mourao</h1>
            <div class="tagline" id="tagline">Desenvolvedor Sênior e Arquiteto de Software</div>
            <ul class="contact-list" id="contact-list">
                <!-- Populated by JavaScript -->
            </ul>
        </div>
        
        <div class="resume-body" style="padding-top: 0 !important; margin-top: 0 !important;">
            <div class="main-content" style="margin-top: 0 !important; padding-top: 0 !important;">
                <section class="about-section" style="margin-top: 0 !important; padding-top: 0 !important; margin-bottom: 0.5rem !important; display: block !important;">
                    <h3 class="section-title" style="margin-top: 0 !important; padding-top: 0 !important; margin-bottom: 0.4rem !important; line-height: 1.2 !important;"><i class="bi bi-person"></i><span id="section-about">Sobre Mim</span></h3>
                    <p id="about-text" style="margin-top: 0 !important; padding-top: 0 !important;">Loading...</p>
                </section>
                
                <hr>
                
                <section class="work-experience-section">
                    <h3 class="section-title"><i class="bi bi-briefcase"></i><span id="section-work">Experiência Profissional</span></h3>
                    <div id="work-experience">
                        <!-- Populated by JavaScript -->
                    </div>
                </section>
            </div>
            
            <div class="sidebar">
                <section class="tech-stack-section">
                    <h3 class="section-title"><i class="bi bi-stack"></i><span id="section-tech">Tech Stack</span></h3>
                    <ul class="soft-skills-list" id="tech-stack">
                        <!-- Populated by JavaScript -->
                    </ul>
                </section>
                
                <section class="soft-skills-section">
                    <h3 class="section-title"><i class="bi bi-person-gear"></i><span id="section-soft">Soft Skills</span></h3>
                    <ul class="soft-skills-list" id="soft-skills">
                        <!-- Populated by JavaScript -->
                    </ul>
                </section>
                
                <section class="education-section">
                    <h3 class="section-title"><i class="bi bi-mortarboard"></i><span id="section-education">Formação</span></h3>
                    <div id="education">
                        <!-- Populated by JavaScript -->
                    </div>
                </section>
                
                <section class="languages-section">
                    <h3 class="section-title"><i class="bi bi-translate"></i><span id="section-languages">Idiomas</span></h3>
                    <div id="languages">
                        <!-- Populated by JavaScript -->
                    </div>
                </section>
                
                <section class="projects-section">
                    <h3 class="section-title"><i class="bi bi-code-square"></i><span id="section-projects">Projetos</span></h3>
                    <div id="projects">
                        <!-- Populated by JavaScript -->
                    </div>
                </section>
                
                <section class="hobbies-section">
                    <h3 class="section-title"><i class="bi bi-heart"></i><span id="section-hobbies">Hobbies</span></h3>
                    <ul class="soft-skills-list" id="hobbies">
                        <!-- Populated by JavaScript -->
                    </ul>
                </section>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let cvData = null;
        let descriptions = null;
        let currentLang = 'pt';

        // Detect language from querystring or browser
        function detectLanguage() {
            const params = new URLSearchParams(window.location.search);
            const langParam = params.get('language');
            
            if (langParam === 'pt' || langParam === 'en') {
                return langParam;
            }
            
            // Auto-detect from browser
            const browserLang = navigator.language || navigator.userLanguage;
            if (browserLang.startsWith('pt')) {
                return 'pt';
            }
            return 'en';
        }

        // Load JSON files
        async function loadData() {
            try {
                const [dataResponse, descResponse] = await Promise.all([
                    fetch('cv-data.json'),
                    fetch(`cv-descriptions-${currentLang}.json`)
                ]);
                
                cvData = await dataResponse.json();
                descriptions = await descResponse.json();
                
                renderCV();
            } catch (error) {
                console.error('Error loading CV data:', error);
                document.body.innerHTML = '<div style="padding: 2rem; text-align: center;"><h2>Error loading CV data</h2><p>Please ensure cv-data.json and cv-descriptions-pt.json/cv-descriptions-en.json are available.</p></div>';
            }
        }

        // Switch language
        function switchLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
            updateLanguageButtons();
            loadData();
        }

        // Update language button states
        function updateLanguageButtons() {
            document.getElementById('lang-pt').classList.toggle('active', currentLang === 'pt');
            document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
        }
        
        // Toggle share menu
        function toggleShareMenu() {
            const menu = document.getElementById('share-menu');
            menu.classList.toggle('show');
        }
        
        // Close share menu when clicking outside
        document.addEventListener('click', function(event) {
            const shareWrapper = document.querySelector('.share-button-wrapper');
            const shareMenu = document.getElementById('share-menu');
            if (shareWrapper && shareMenu && !shareWrapper.contains(event.target)) {
                shareMenu.classList.remove('show');
            }
        });
        
        // Share via WhatsApp
        async function shareViaWhatsApp(event) {
            event.preventDefault();
            const menu = document.getElementById('share-menu');
            menu.classList.remove('show');
            
            try {
                // Format phone number for WhatsApp
                const phoneNumber = cvData.personal.phone.replace(/[\s\-+]/g, '');
                const message = descriptions.messages.whatsapp;
                const text = encodeURIComponent(message);
                window.open(`https://wa.me/${phoneNumber}?text=${text}`, '_blank');
            } catch (error) {
                console.error('Error sharing via WhatsApp:', error);
            }
        }
        
        // Share via Email
        async function shareViaEmail(event) {
            event.preventDefault();
            const menu = document.getElementById('share-menu');
            menu.classList.remove('show');
            
            try {
                const subject = encodeURIComponent(descriptions.messages.email.subject);
                const body = encodeURIComponent(descriptions.messages.email.body);
                window.location.href = `mailto:?subject=${subject}&body=${body}`;
            } catch (error) {
                console.error('Error sharing via email:', error);
            }
        }
        
        // Share via LinkedIn
        function shareViaLinkedIn(event) {
            event.preventDefault();
            const menu = document.getElementById('share-menu');
            menu.classList.remove('show');
            
            const url = encodeURIComponent(window.location.href);
            window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`, '_blank');
        }

        // Render CV content
        function renderCV() {
            if (!cvData || !descriptions) return;

            // Update page title and meta tags
            const pageTitle = descriptions.seo ? descriptions.seo.title : (currentLang === 'pt' ? 'Currículo - Marcelo Mourao' : 'Resume - Marcelo Mourao');
            const pageDescription = descriptions.seo ? descriptions.seo.description : (currentLang === 'pt' ? 'Desenvolvedor Sênior e Arquiteto de Software com mais de 15 anos de experiência' : 'Senior Developer and Software Architect with over 15 years of experience');
            
            document.getElementById('page-title').textContent = pageTitle;
            
            // Update meta tags
            const ogTitle = document.getElementById('og-title');
            const ogDescription = document.getElementById('og-description');
            const twitterTitle = document.getElementById('twitter-title');
            const twitterDescription = document.getElementById('twitter-description');
            const metaDescription = document.getElementById('meta-description');
            
            if (ogTitle) ogTitle.setAttribute('content', pageTitle);
            if (ogDescription) ogDescription.setAttribute('content', pageDescription);
            if (twitterTitle) twitterTitle.setAttribute('content', pageTitle);
            if (twitterDescription) twitterDescription.setAttribute('content', pageDescription);
            if (metaDescription) metaDescription.setAttribute('content', pageDescription);

            // Header
            document.getElementById('name').textContent = cvData.personal.name;
            document.getElementById('tagline').textContent = cvData.personal.tagline[currentLang];
            document.getElementById('profile-image').src = cvData.personal.photo;

            // Contact list
            // Format phone number for WhatsApp (remove spaces, dashes, and +)
            const phoneNumber = cvData.personal.phone.replace(/[\s\-+]/g, '');
            const whatsappMessage = encodeURIComponent(descriptions.messages.whatsapp);
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${whatsappMessage}`;
            
            // Format email with subject and body
            const emailSubject = encodeURIComponent(descriptions.messages.email.subject);
            const emailBody = encodeURIComponent(descriptions.messages.email.body);
            const emailUrl = `mailto:${cvData.personal.email}?subject=${emailSubject}&body=${emailBody}`;
            
            const contactList = document.getElementById('contact-list');
            contactList.innerHTML = `
                <li><i class="bi bi-geo-alt"></i>${cvData.personal.location[currentLang]}</li>
                <li>
                    <a href="${whatsappUrl}" target="_blank" style="display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-color); text-decoration: none;">
                        <i class="bi bi-telephone"></i>
                        <i class="bi bi-whatsapp" style="color: #25D366;"></i>
                        <span>${cvData.personal.phone}</span>
                    </a>
                </li>
                <li>
                    <i class="bi bi-envelope"></i>
                    <a href="${emailUrl}">${cvData.personal.email}</a>
                </li>
                <li><i class="bi bi-linkedin"></i><a href="${cvData.personal.linkedin}" target="_blank">linkedin.com/in/msmourao</a></li>
                <li><i class="bi bi-github"></i><a href="${cvData.personal.github}" target="_blank">github.com/msmourao</a></li>
            `;

            // Sections titles
            document.getElementById('section-about').textContent = descriptions.sections.about;
            document.getElementById('section-work').textContent = descriptions.sections.workExperience;
            document.getElementById('section-tech').textContent = descriptions.sections.techStack;
            document.getElementById('section-soft').textContent = descriptions.sections.softSkills;
            document.getElementById('section-education').textContent = descriptions.sections.education;
            document.getElementById('section-languages').textContent = descriptions.sections.languages;
            document.getElementById('section-projects').textContent = descriptions.sections.projects;
            document.getElementById('section-hobbies').textContent = descriptions.sections.hobbies;
            
            // Update button titles and labels
            if (descriptions.buttons) {
                const shareButton = document.getElementById('share-button-title');
                const printButton = document.getElementById('print-button-title');
                const whatsappLabel = document.getElementById('share-whatsapp-label');
                const emailLabel = document.getElementById('share-email-label');
                const linkedinLabel = document.getElementById('share-linkedin-label');
                
                if (shareButton) shareButton.title = descriptions.buttons.share;
                if (printButton) printButton.title = descriptions.buttons.print;
                if (whatsappLabel && descriptions.buttons.shareOptions) whatsappLabel.textContent = descriptions.buttons.shareOptions.whatsapp;
                if (emailLabel && descriptions.buttons.shareOptions) emailLabel.textContent = descriptions.buttons.shareOptions.email;
                if (linkedinLabel && descriptions.buttons.shareOptions) linkedinLabel.textContent = descriptions.buttons.shareOptions.linkedin;
            }

            // About
            document.getElementById('about-text').textContent = descriptions.about;

            // Work experience
            const workExp = document.getElementById('work-experience');
            workExp.innerHTML = cvData.workExperience.map(job => {
                const jobDesc = descriptions.workExperience[job.key];
                if (!jobDesc) return '';
                
                return `
                    <div class="timeline-item">
                        <div class="timeline-header">
                            <div class="timeline-period">${job.period[currentLang]}</div>
                            <div class="timeline-title">${job.title[currentLang]}</div>
                            <div class="timeline-company">${typeof job.company === 'object' ? job.company[currentLang] : job.company}</div>
                        </div>
                        <div class="timeline-content">
                            <p>${jobDesc.description}</p>
                            <ul>
                                ${jobDesc.bullets.map(bullet => `<li>${bullet}</li>`).join('')}
                            </ul>
                            <div class="technologies-box">
                                <strong>${currentLang === 'pt' ? 'Tecnologias e ferramentas:' : 'Technologies and tools:'}</strong> ${jobDesc.technologies}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Tech stack
            const techStack = document.getElementById('tech-stack');
            techStack.innerHTML = cvData.techStack.map(tech => 
                `<li><i class="bi bi-circle-fill" style="font-size: 0.5rem; color: var(--primary-color);"></i> ${tech}</li>`
            ).join('');

            // Soft skills
            const softSkills = document.getElementById('soft-skills');
            softSkills.innerHTML = cvData.softSkills.map(skill => 
                `<li>${skill[currentLang]}</li>`
            ).join('');

            // Education
            const education = document.getElementById('education');
            education.innerHTML = cvData.education.map(edu => `
                <div class="education-item">
                    <div class="edu-title">${edu.title[currentLang]}</div>
                    <div class="edu-institution">${edu.institution}</div>
                    <div class="edu-period">${edu.period[currentLang]}</div>
                    ${edu.note ? `<small class="text-muted">${edu.note[currentLang]}</small>` : ''}
                </div>
            `).join('');

            // Languages
            const languages = document.getElementById('languages');
            languages.innerHTML = cvData.languages.map(lang => {
                const dots = Array(5).fill(0).map((_, i) => 
                    `<div class="language-dot ${i < lang.dots ? 'filled' : ''}"></div>`
                ).join('');
                
                return `
                    <div class="language-item">
                        <div class="language-name">${lang.name[currentLang]}: ${lang.level[currentLang]}</div>
                        ${lang.dots < 5 ? `<div class="language-level"><div class="language-dots">${dots}</div></div>` : ''}
                    </div>
                `;
            }).join('');

            // Projects
            const projects = document.getElementById('projects');
            projects.innerHTML = cvData.projects.map(proj => {
                const projDesc = descriptions.projects[proj.key];
                if (!projDesc) return '';
                
                return `
                    <div class="project-item">
                        <h4><i class="bi ${proj.icon}" style="font-size: 0.5rem; color: var(--primary-color);"></i> ${projDesc.name}</h4>
                        <p>${projDesc.description}</p>
                    </div>
                `;
            }).join('');

            // Hobbies
            const hobbies = document.getElementById('hobbies');
            hobbies.innerHTML = cvData.hobbies.map(hobby => 
                `<li><i class="bi bi-circle-fill" style="font-size: 0.5rem; color: var(--primary-color);"></i> ${hobby[currentLang]}</li>`
            ).join('');
        }

        // Initialize
        currentLang = detectLanguage();
        document.documentElement.lang = currentLang === 'pt' ? 'pt-BR' : 'en';
        updateLanguageButtons();
        loadData();
    </script>
</body>
</html>
