    <script>
        let cvData = null;
        let descriptions = null;
        let currentLang = 'pt';

        function detectLanguage() {
            const params = new URLSearchParams(window.location.search);
            const langParam = params.get('language');
            
            if (langParam === 'pt' || langParam === 'en') {
                return langParam;
            }
            
            const browserLang = navigator.language || navigator.userLanguage;
            if (browserLang.startsWith('pt')) {
                return 'pt';
            }
            return 'en';
        }

        async function loadData() {
            try {
                const [dataResponse, descResponse] = await Promise.all([
                    fetch('cv-data.json'),
                    fetch(`cv-descriptions-${currentLang}.json`)
                ]);
                
                cvData = await dataResponse.json();
                descriptions = await descResponse.json();
                
                renderCV();
            } catch (error) {
                console.error('Error loading CV data:', error);
            }
        }

        function switchLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
            updateLanguageButtons();
            ThemeManager.updateLanguage(lang);
            
            // Notificar TTS sobre mudança de idioma
            if (window.TTS) {
                document.dispatchEvent(new CustomEvent('languageChanged', { detail: { lang } }));
            }
            
            loadData();
        }

        function updateLanguageButtons() {
            document.getElementById('lang-pt').classList.toggle('active', currentLang === 'pt');
            document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
        }

        function toggleShareMenu() {
            const menu = document.getElementById('share-menu');
            menu.classList.toggle('show');
        }

        function shareViaWhatsApp(event) {
            event.preventDefault();
            const menu = document.getElementById('share-menu');
            menu.classList.remove('show');
            
            try {
                const phoneNumber = cvData.personal.phone.replace(/[\s\-+]/g, '');
                const message = descriptions.messages.whatsapp;
                const text = encodeURIComponent(message);
                window.open(`https://wa.me/${phoneNumber}?text=${text}`, '_blank');
            } catch (error) {
                console.error('Error sharing via WhatsApp:', error);
            }
        }
        
        async function shareViaEmail(event) {
            event.preventDefault();
            const menu = document.getElementById('share-menu');
            menu.classList.remove('show');
            
            try {
                const subject = encodeURIComponent(descriptions.messages.email.subject);
                const body = encodeURIComponent(descriptions.messages.email.body);
                window.location.href = `mailto:?subject=${subject}&body=${body}`;
            } catch (error) {
                console.error('Error sharing via email:', error);
            }
        }
        
        function shareViaLinkedIn(event) {
            event.preventDefault();
            const menu = document.getElementById('share-menu');
            menu.classList.remove('show');
            
            const url = encodeURIComponent(window.location.href);
            window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`, '_blank');
        }
        
        // Simplified section toggle - apenas adiciona/remove classe active
        function showSection(sectionName) {
            // Remove active de todos os nav items
            document.querySelectorAll('.mobile-nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // Remove active de todas as seções
            document.querySelectorAll('.sidebar-section, .work-experience-section, .profile-section, .contact-section').forEach(sec => {
                sec.classList.remove('active');
            });
            
            // Remover headers mobile duplicados
            document.querySelectorAll('.mobile-header-section').forEach(header => {
                header.remove();
            });
            
            // Adiciona active no nav item correspondente
            const navItem = document.querySelector(`.mobile-nav-item[data-section="${sectionName}"]`);
            if (navItem) {
                navItem.classList.add('active');
            }
            
            // Mapeamento de seções mobile
            if (sectionName === 'about') {
                // About: profile + contact + summary
                const profileSection = document.querySelector('.profile-section');
                const contactSection = document.querySelector('.contact-section');
                if (profileSection) {
                    profileSection.classList.add('active');
                    // Adicionar header no topo
                    addMobileHeader(profileSection);
                }
                if (contactSection) contactSection.classList.add('active');
                const summarySection = document.querySelector('[data-section="summary"]');
                if (summarySection) summarySection.classList.add('active');
            } else if (sectionName === 'tech') {
                // Tech: skills + achievements
                const skillsSection = document.querySelector('[data-section="skills"]');
                const achievementsSection = document.querySelector('[data-section="achievements"]');
                if (skillsSection) {
                    skillsSection.classList.add('active');
                    addMobileHeader(skillsSection);
                }
                if (achievementsSection) achievementsSection.classList.add('active');
            } else if (sectionName === 'education') {
                // Education: education + languages
                const educationSection = document.querySelector('[data-section="education"]');
                const languagesSection = document.querySelector('[data-section="languages"]');
                if (educationSection) {
                    educationSection.classList.add('active');
                    addMobileHeader(educationSection);
                }
                if (languagesSection) languagesSection.classList.add('active');
            } else if (sectionName === 'projects') {
                // Projects: projects + hobbies
                const projectsSection = document.querySelector('[data-section="projects"]');
                const hobbiesSection = document.querySelector('[data-section="hobbies"]');
                if (projectsSection) {
                    projectsSection.classList.add('active');
                    addMobileHeader(projectsSection);
                }
                if (hobbiesSection) hobbiesSection.classList.add('active');
            } else if (sectionName === 'experience') {
                // Experience: work experience
                const experienceSection = document.querySelector('[data-section="experience"]');
                if (experienceSection) experienceSection.classList.add('active');
                // Header já está no main-content para experiência
            }
        }
        
        function addMobileHeader(section) {
            // Criar header duplicado
            const header = document.createElement('header');
            header.className = 'mobile-header-section';
            const nameEl = document.getElementById('name');
            const taglineEl = document.getElementById('tagline');
            if (nameEl && taglineEl && header) {
                header.innerHTML = `
                    <h1 class="name">${nameEl.textContent}</h1>
                    <div class="tagline">${taglineEl.textContent}</div>
                `;
                // Inserir antes da seção, garantindo que seja o primeiro elemento
                if (section.parentNode) {
                    section.parentNode.insertBefore(header, section);
                }
            }
        }

        function renderCV() {
            if (!cvData || !descriptions) return;

            const pageTitle = descriptions.seo ? descriptions.seo.title : (currentLang === 'pt' ? 'Currículo - Marcelo Mourão' : 'Resume - Marcelo Mourão');
            const pageDescription = descriptions.seo ? descriptions.seo.description : (currentLang === 'pt' ? 'Desenvolvedor Sênior e Arquiteto de Software com mais de 15 anos de experiência' : 'Senior Developer and Software Architect with over 15 years of experience');
            
            document.getElementById('page-title').textContent = pageTitle;
            
            const ogTitle = document.getElementById('og-title');
            const ogDescription = document.getElementById('og-description');
            const twitterTitle = document.getElementById('twitter-title');
            const twitterDescription = document.getElementById('twitter-description');
            const metaDescription = document.getElementById('meta-description');
            
            if (ogTitle) ogTitle.setAttribute('content', pageTitle);
            if (ogDescription) ogDescription.setAttribute('content', pageDescription);
            if (twitterTitle) twitterTitle.setAttribute('content', pageTitle);
            if (twitterDescription) twitterDescription.setAttribute('content', pageDescription);
            if (metaDescription) metaDescription.setAttribute('content', pageDescription);

            // Verificar qual template está ativo
            const isATSFriendly = document.body.classList.contains('ats-friendly-template');
            const isStarWars = document.body.classList.contains('star-wars-template');
            
            // Header
            const nameEl = document.getElementById('name');
            const taglineEl = document.getElementById('tagline');
            if (nameEl) {
                if (isStarWars) {
                    nameEl.textContent = cvData.personal.name.toUpperCase();
                } else {
                    nameEl.textContent = cvData.personal.name;
                }
            }
            if (taglineEl) taglineEl.textContent = cvData.personal.tagline[currentLang];
            
            // Foto apenas se não for ATS-Friendly
            if (!isATSFriendly) {
                const profileImage = document.getElementById('profile-image');
                if (profileImage) {
                    let photoPath = cvData.personal.photo;
                    if (photoPath.startsWith('http://') || photoPath.startsWith('https://')) {
                        photoPath = './' + photoPath.split('/').pop();
                    } else if (!photoPath.startsWith('./')) {
                        photoPath = './' + photoPath;
                    }
                    profileImage.src = photoPath;
                    profileImage.setAttribute('src', photoPath);
                }
            }
            
            // Se for Star Wars, renderizar crawl e aplicar preset Vader
            if (isStarWars) {
                renderStarWarsCrawl(cvData, descriptions, currentLang);
                // Aplicar preset Vader para o tema Star Wars
                if (window.TTS && window.TTS.applyPreset) {
                    window.TTS.applyPreset('vader');
                }
            }

            // Contact list
            const phoneNumber = cvData.personal.phone.replace(/[\s\-+]/g, '');
            const whatsappMessage = encodeURIComponent(descriptions.messages.whatsapp);
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${whatsappMessage}`;
            
            const emailSubject = encodeURIComponent(descriptions.messages.email.subject);
            const emailBody = encodeURIComponent(descriptions.messages.email.body);
            const emailUrl = `mailto:${cvData.personal.email}?subject=${emailSubject}&body=${emailBody}`;
            
            const contactListEl = document.getElementById('contact-list');
            if (contactListEl) {
                if (isATSFriendly) {
                    // ATS-Friendly: contato simples, sem ícones, no header
                    contactListEl.innerHTML = `
                        <ul>
                            <li>${cvData.personal.location[currentLang]}</li>
                            <li>${cvData.personal.phone}</li>
                            <li><a href="${emailUrl}">${cvData.personal.email}</a></li>
                            <li><a href="${cvData.personal.linkedin}" target="_blank">linkedin.com/in/msmourao</a></li>
                            <li><a href="${cvData.personal.github}" target="_blank">github.com/msmourao</a></li>
                        </ul>
                    `;
                } else {
                    // Better-view: contato com ícones na sidebar
                    contactListEl.innerHTML = `
                        <li class="contact-item"><i class="bi bi-geo-alt"></i><span>${cvData.personal.location[currentLang]}</span></li>
                        <li class="contact-item">
                            <a href="${whatsappUrl}" target="_blank">
                                <i class="bi bi-telephone"></i>
                                <i class="bi bi-whatsapp"></i>
                                <span>${cvData.personal.phone}</span>
                            </a>
                        </li>
                        <li class="contact-item">
                            <a href="${emailUrl}">
                                <i class="bi bi-envelope"></i>
                                <span>${cvData.personal.email}</span>
                            </a>
                        </li>
                        <li class="contact-item"><a href="${cvData.personal.linkedin}" target="_blank"><i class="bi bi-linkedin"></i> <span>linkedin.com/in/msmourao</span></a></li>
                        <li class="contact-item"><a href="${cvData.personal.github}" target="_blank"><i class="bi bi-github"></i> <span>github.com/msmourao</span></a></li>
                    `;
                }
            }

            // Sections titles - verificar se elementos existem (depende do template)
            const sectionSummary = document.getElementById('section-summary');
            const sectionAchievements = document.getElementById('section-key-achievements');
            const sectionWork = document.getElementById('section-work');
            const sectionTech = document.getElementById('section-tech');
            const sectionEducation = document.getElementById('section-education');
            const sectionLanguages = document.getElementById('section-languages');
            const sectionProjects = document.getElementById('section-projects');
            const sectionHobbies = document.getElementById('section-hobbies');
            
            if (sectionSummary) sectionSummary.textContent = descriptions.sections.summary;
            if (sectionAchievements) sectionAchievements.textContent = descriptions.sections.keyAchievements;
            if (sectionWork) sectionWork.textContent = descriptions.sections.workExperience;
            if (sectionTech) sectionTech.textContent = descriptions.sections.techStack;
            if (sectionEducation) sectionEducation.textContent = descriptions.sections.education;

            // Function to convert date to MM/yyyy format
            function formatDateToMMYYYY(dateStr, lang) {
                const monthMapPt = {
                    'janeiro': '01', 'fevereiro': '02', 'março': '03', 'abril': '04',
                    'maio': '05', 'junho': '06', 'julho': '07', 'agosto': '08',
                    'setembro': '09', 'outubro': '10', 'novembro': '11', 'dezembro': '12'
                };
                const monthMapEn = {
                    'january': '01', 'february': '02', 'march': '03', 'april': '04',
                    'may': '05', 'june': '06', 'july': '07', 'august': '08',
                    'september': '09', 'october': '10', 'november': '11', 'december': '12'
                };
                
                const monthMap = lang === 'pt' ? monthMapPt : monthMapEn;
                const present = lang === 'pt' ? 'Presente' : 'Present';
                
                if (dateStr.includes('–') || dateStr.includes('—') || dateStr.includes('-')) {
                    const separator = dateStr.includes('–') ? '–' : (dateStr.includes('—') ? '—' : '-');
                    const parts = dateStr.split(separator).map(s => s.trim());
                    
                    const formatPart = (part) => {
                        if (part.toLowerCase() === present.toLowerCase()) {
                            return lang === 'pt' ? 'Presente' : 'Present';
                        }
                        const words = part.toLowerCase().split(' ');
                        if (words.length >= 2) {
                            const month = words[0];
                            const year = words[1];
                            const monthNum = monthMap[month] || month;
                            return `${monthNum}/${year}`;
                        }
                        return part;
                    };
                    
                    return `${formatPart(parts[0])} - ${formatPart(parts[1])}`;
                }
                
                return dateStr;
            }

            const profileImage = document.getElementById('profile-image');

                // Forçar carregamento da imagem

                    profileImage.style.display = 'block';

        // Variáveis globais para o crawl
        let starWarsCrawlState = {
            rafId: null,
            startTime: null,
            offsetMs: 0,
            running: false,
            resizeHandler: null,
            mutationObserver: null
        };
        
        function startStarWarsCrawl() {
            const scroll = document.getElementById('sw-crawl');
            if (!scroll) return;
            
            // Parar animação anterior se existir
            if (starWarsCrawlState.running) {
                starWarsCrawlState.running = false;
                if (starWarsCrawlState.rafId) {
                    cancelAnimationFrame(starWarsCrawlState.rafId);
                }
            }
            
            // Remover listener anterior se existir
            if (starWarsCrawlState.resizeHandler) {
                window.removeEventListener('resize', starWarsCrawlState.resizeHandler);
            }
            if (starWarsCrawlState.mutationObserver) {
                starWarsCrawlState.mutationObserver.disconnect();
            }
            
            // Resetar estado completamente para garantir início correto
            starWarsCrawlState.startTime = null;
            starWarsCrawlState.offsetMs = 0;
            starWarsCrawlState.running = false;
            
            // Resetar transform para garantir medição correta
            scroll.style.transform = 'none';
            scroll.style.visibility = 'hidden';
            scroll.style.opacity = '0';
            
            const SPEED_PX_PER_S = 20;  // px/s - maior = sobe mais rápido
            const EXTRA = 160; // folga para quando o conteúdo sair do topo
            
            let contentHeight = 0;
            let startTranslate = 0;
            let endTranslate = 0;
            let DURATION_MS = 28000;
            
            function setTranslate(y) {
                scroll.style.transform = `translateY(${Math.round(y)}px) translateZ(0px)`;
            }
            
            function getFirstTop() {
                const first = scroll.firstElementChild;
                if (!first) return null;
                return first.getBoundingClientRect().top;
            }
            
            // Medição robusta: remove transform, espera dois frames, mede scrollHeight e rect.top
            async function measureAndFindStart() {
                // remove transform para medir posição natural
                const prev = scroll.style.transform;
                scroll.style.transform = 'none';
                
                // espera dois frames para layout estabilizar
                await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
                
                // força reflow
                void document.body.offsetHeight;
                
                // altura total do conteúdo
                contentHeight = scroll.scrollHeight;
                
                // desiredTop: queremos que o topo do primeiro filho fique exatamente na borda inferior
                const desiredTop = window.innerHeight;
                
                // start from 0 (no translate) and iteratively adjust
                let translate = 0;
                setTranslate(translate);
                // small wait for rect to reflect
                void scroll.offsetHeight;
                
                // iterative correction loop
                const maxIter = 12;
                const tol = 1; // px
                for (let i = 0; i < maxIter; i++) {
                    const top = getFirstTop();
                    if (top === null) break;
                    const delta = desiredTop - top;
                    // if already within tolerance, break
                    if (Math.abs(delta) <= tol) {
                        translate = translate + delta; // final adjust (tiny)
                        setTranslate(translate);
                        break;
                    }
                    // apply correction
                    translate = translate + delta;
                    setTranslate(translate);
                    // force reflow so next measurement is accurate
                    void scroll.offsetHeight;
                }
                
                // after loop, set startTranslate and endTranslate
                startTranslate = Math.round(translate);
                endTranslate = startTranslate - (contentHeight + EXTRA);
                
                // compute duration from distance and speed
                const distancePx = Math.abs(startTranslate - endTranslate);
                DURATION_MS = Math.max(1, Math.round((distancePx / SPEED_PX_PER_S) * 1000));
            }
            
            function applyT(t) {
                const y = startTranslate + (endTranslate - startTranslate) * t;
                setTranslate(y);
            }
            
            function frame(now) {
                if (!starWarsCrawlState.startTime) starWarsCrawlState.startTime = now;
                const elapsed = now - starWarsCrawlState.startTime;
                const total = (starWarsCrawlState.offsetMs + elapsed);
                const t = ((total % DURATION_MS) / DURATION_MS);
                applyT(t);
                if (starWarsCrawlState.running) {
                    starWarsCrawlState.rafId = requestAnimationFrame(frame);
                }
            }
            
            async function startAuto() {
                // Forçar reflow para garantir que o conteúdo está renderizado
                void scroll.offsetHeight;
                
                // Aguardar dois frames para garantir layout estável
                await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
                
                // Garantir que está visível antes de medir
                scroll.style.visibility = 'visible';
                scroll.style.opacity = '1';
                
                // Forçar outro reflow após tornar visível
                void scroll.offsetHeight;
                
                await measureAndFindStart();
                applyT(0);
                
                // Forçar mais um reflow após aplicar transform inicial
                void scroll.offsetHeight;
                
                starWarsCrawlState.startTime = performance.now();
                starWarsCrawlState.running = true;
                frame(performance.now());
            }
            
            // resize: recalcula mantendo offset relativo
            starWarsCrawlState.resizeHandler = async () => {
                const wasRunning = starWarsCrawlState.running;
                if (wasRunning) {
                    const now = performance.now();
                    const elapsed = now - (starWarsCrawlState.startTime || now);
                    starWarsCrawlState.offsetMs = (starWarsCrawlState.offsetMs + elapsed) % DURATION_MS;
                    starWarsCrawlState.running = false;
                    if (starWarsCrawlState.rafId) cancelAnimationFrame(starWarsCrawlState.rafId);
                    starWarsCrawlState.startTime = null;
                }
                await measureAndFindStart();
                applyT((starWarsCrawlState.offsetMs % DURATION_MS) / DURATION_MS);
                if (wasRunning) {
                    starWarsCrawlState.startTime = performance.now();
                    starWarsCrawlState.running = true;
                    frame(performance.now());
                }
            };
            
            window.addEventListener('resize', starWarsCrawlState.resizeHandler);
            
            // MutationObserver: se conteúdo mudar, recalcula e reinicia do início
            starWarsCrawlState.mutationObserver = new MutationObserver(async (mutations) => {
                let relevant = false;
                for (const m of mutations) {
                    if (m.type === 'childList' || m.type === 'subtree' || m.type === 'characterData') {
                        relevant = true;
                        break;
                    }
                }
                if (relevant) {
                    // pausa e zera offset para garantir que comece do início
                    if (starWarsCrawlState.running) {
                        starWarsCrawlState.running = false;
                        if (starWarsCrawlState.rafId) cancelAnimationFrame(starWarsCrawlState.rafId);
                        starWarsCrawlState.startTime = null;
                        starWarsCrawlState.offsetMs = 0;
                    }
                    await measureAndFindStart();
                    applyT(0);
                    // retoma autoplay do início
                    starWarsCrawlState.startTime = performance.now();
                    starWarsCrawlState.running = true;
                    frame(performance.now());
                }
            });
            starWarsCrawlState.mutationObserver.observe(scroll, { childList: true, subtree: true, characterData: true });
            
            // inicia após layout e fontes
            function initWhenReady() {
                const onReady = () => {
                    const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
                    fontsReady.then(() => {
                        // Aguardar mais tempo para garantir que o conteúdo está totalmente renderizado
                        // Especialmente importante para primeira carga em dispositivos móveis e navegadores novos
                        setTimeout(() => {
                            // Forçar múltiplos reflows para garantir layout estável
                            void scroll.offsetHeight;
                            void document.body.offsetHeight;
                            
                            requestAnimationFrame(() => {
                                void scroll.offsetHeight;
                                requestAnimationFrame(() => {
                                    void scroll.offsetHeight;
                                    startAuto();
                                    
                                    // Autoplay será gerenciado por um listener único abaixo
                                });
                            });
                        }, 400); // Aumentado de 100ms para 400ms para dar mais tempo
                    });
                };
                
                // Verificar se já está completo ou aguardar
                if (document.readyState === 'complete' || document.readyState === 'interactive') {
                    // Se já está pronto, aguardar um pouco mais para garantir renderização
                    setTimeout(onReady, 300);
                } else {
                    window.addEventListener('load', onReady, { once: true });
                    // Fallback: também tentar quando DOM estiver pronto
                    if (document.readyState === 'loading') {
                        document.addEventListener('DOMContentLoaded', () => {
                            setTimeout(onReady, 400);
                        }, { once: true });
                    }
                }
            }
            initWhenReady();
        }
        
        // Flag global para controlar estado do áudio
        let swMusicIsPlaying = false;
        let swMusicAutoPlayTimeout = null;
        
        // Função única para iniciar autoplay do áudio Star Wars
        function startStarWarsMusic() {
            // Cancelar qualquer timeout anterior
            if (swMusicAutoPlayTimeout) {
                clearTimeout(swMusicAutoPlayTimeout);
                swMusicAutoPlayTimeout = null;
            }
            
            // Aguardar um pouco para garantir que tudo está carregado
            swMusicAutoPlayTimeout = setTimeout(() => {
                if (window.swPlayMusic && document.body.classList.contains('star-wars-template')) {
                    window.swPlayMusic();
                }
                swMusicAutoPlayTimeout = null;
            }, 1500);
        }
        
        // Listener único para detectar quando o template Star Wars é carregado
        (function() {
            let lastTemplate = null;
            
            function checkTemplateChange() {
                const isStarWars = document.body.classList.contains('star-wars-template');
                
                // Se acabou de entrar no template Star Wars
                if (isStarWars && lastTemplate !== 'star-wars') {
                    startStarWarsMusic();
                }
                
                // Se saiu do template Star Wars, pausar música
                if (!isStarWars && lastTemplate === 'star-wars') {
                    if (window.swPauseMusic) {
                        window.swPauseMusic();
                    }
                    if (swMusicAutoPlayTimeout) {
                        clearTimeout(swMusicAutoPlayTimeout);
                        swMusicAutoPlayTimeout = null;
                    }
                }
                
                lastTemplate = isStarWars ? 'star-wars' : null;
            }
            
            // Verificar mudanças no template usando MutationObserver
            const observer = new MutationObserver(checkTemplateChange);
            
            // Inicializar quando DOM estiver pronto
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => {
                    checkTemplateChange(); // Verificar estado inicial
                    observer.observe(document.body, {
                        attributes: true,
                        attributeFilter: ['class']
                    });
                });
            } else {
                checkTemplateChange(); // Verificar estado inicial
                observer.observe(document.body, {
                    attributes: true,
                    attributeFilter: ['class']
                });
            }
        })();
        
        // Music Player Functions
        function swPlayMusic(force = false) {
            try {
                const audio = document.getElementById('sw-audio');
                const playBtn = document.getElementById('sw-play');
                const pauseBtn = document.getElementById('sw-pause');
                
                if (!audio) {
                    return; // Silenciosamente retorna se não encontrar
                }
                
                // Se já está tocando e não for forçado, não fazer nada
                if (swMusicIsPlaying && !force) {
                    return;
                }
                
                // Se não estiver no template Star Wars, não tocar
                if (!document.body.classList.contains('star-wars-template')) {
                    return;
                }
                
                // Verificar se há source configurado
                const source = audio.querySelector('source');
                const hasSource = audio.src || (source && source.src);
                
                if (!hasSource) {
                    return; // Silenciosamente retorna se não houver arquivo
                }
                
                // Função auxiliar para tentar tocar
                const attemptPlay = () => {
                    const playPromise = audio.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            swMusicIsPlaying = true;
                            if (playBtn) playBtn.style.display = 'none';
                            if (pauseBtn) pauseBtn.style.display = 'flex';
                        }).catch(error => {
                            // Silenciosamente ignora erros de autoplay (NotAllowedError)
                            // Só loga se não for erro de autoplay
                            if (error.name !== 'NotAllowedError' && error.name !== 'AbortError') {
                                // Log discreto apenas para outros tipos de erro
                            }
                            // Não atualiza a flag se falhar por autoplay
                        });
                    } else {
                        swMusicIsPlaying = true;
                        if (playBtn) playBtn.style.display = 'none';
                        if (pauseBtn) pauseBtn.style.display = 'flex';
                    }
                };
                
                // Tentar carregar o source se necessário
                if (!audio.src && source && source.src) {
                    audio.load();
                    // Aguardar o carregamento antes de tentar tocar
                    audio.addEventListener('canplaythrough', () => {
                        attemptPlay();
                    }, { once: true });
                    return;
                }
                
                // Se já tiver source, tentar tocar diretamente
                attemptPlay();
            } catch (error) {
                // Silenciosamente ignora erros
            }
        }
        
        function swPauseMusic() {
            try {
                const audio = document.getElementById('sw-audio');
                const playBtn = document.getElementById('sw-play');
                const pauseBtn = document.getElementById('sw-pause');
                
                if (audio) {
                    audio.pause();
                    swMusicIsPlaying = false;
                    if (playBtn) playBtn.style.display = 'flex';
                    if (pauseBtn) pauseBtn.style.display = 'none';
                }
            } catch (error) {
                // Silenciosamente ignora erros
            }
        }
        
        function swStopMusic() {
            try {
                const audio = document.getElementById('sw-audio');
                const playBtn = document.getElementById('sw-play');
                const pauseBtn = document.getElementById('sw-pause');
                
                if (audio) {
                    audio.pause();
                    audio.currentTime = 0;
                    swMusicIsPlaying = false;
                    if (playBtn) playBtn.style.display = 'flex';
                    if (pauseBtn) pauseBtn.style.display = 'none';
                }
            } catch (error) {
                // Silenciosamente ignora erros
            }
        }
        
        function swSetVolume(value) {
            try {
                const audio = document.getElementById('sw-audio');
                if (audio) {
                    audio.volume = value / 100;
                }
            } catch (error) {
                console.error('Error in swSetVolume:', error);
            }
        }
        
        // Expor funções globalmente
        window.swPlayMusic = swPlayMusic;
        window.swPauseMusic = swPauseMusic;
        window.swStopMusic = swStopMusic;
        window.swSetVolume = swSetVolume;
        window.renderStarWarsCrawl = renderStarWarsCrawl;
    </script>
