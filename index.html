<body>
    <!-- Action Buttons -->
    <div class="action-buttons" id="action-buttons-template">
        <div class="action-buttons-container">
            <div class="language-switch">
                <button id="lang-pt" onclick="switchLanguage('pt')">PT</button>
                <button id="lang-en" onclick="switchLanguage('en')">EN</button>
            </div>
            
            <div class="separator"></div>
            
            <div class="action-buttons-group">
                <div class="share-button-wrapper">
                    <button class="share-button" onclick="toggleShareMenu()" id="share-button-title">
                        <i class="bi bi-share"></i>
                    </button>
                    <div class="share-menu" id="share-menu">
                        <a href="#" class="share-menu-item whatsapp" onclick="shareViaWhatsApp(event)">

                            <span id="share-whatsapp-label">WhatsApp</span>
                        </a>
                        <a href="#" class="share-menu-item email" onclick="shareViaEmail(event)">
                            <i class="bi bi-envelope"></i>
                            <span id="share-email-label">Email</span>
                        </a>
                        <a href="#" class="share-menu-item linkedin" onclick="shareViaLinkedIn(event)">

                            <span id="share-linkedin-label">LinkedIn</span>
                        </a>
                    </div>
                </div>
                
                <button class="print-button" onclick="handlePrint()" id="print-button-title" title="Imprimir">
                    <i class="bi bi-printer"></i>
                </button>
                
                <div class="theme-button-wrapper">
                    <button class="theme-button" onclick="ThemeManager.toggleThemeMenu()" id="theme-button-title" title="Temas">
                        <i class="bi bi-palette-fill"></i>
                    </button>
                    <div class="theme-menu" id="theme-menu">
                        <!-- Populated by JavaScript -->
                    </div>

<body>
    
    <!-- Unified Layout - CSS reorganizes for desktop/mobile/print -->
    <!-- Template will be loaded here -->
    <div class="resume-wrapper">
        <!-- Left Sidebar (becomes regular sections in mobile) -->
        <aside class="sidebar">
            <section class="profile-section">
                <img id="profile-image" src="marcelo.png" alt="Marcelo Mourão" class="profile-image">
            </section>
            
            <section class="contact-section">
                <ul class="contact-list" id="contact-list">
                    <!-- Populated by JavaScript -->
                </ul>
            </section>
            
            <section class="sidebar-section" data-section="summary">
                <h2 class="sidebar-section-title" id="section-summary">Resumo</h2>
                <p class="summary-text" id="summary-text">Loading...</p>
            </section>
            
            <section class="sidebar-section" data-section="skills">
                <h2 class="sidebar-section-title" id="section-tech">Skills</h2>
                <ul class="tech-stack-list" id="tech-stack">
                    <!-- Populated by JavaScript -->
                </ul>
            </section>
            
            <section class="sidebar-section" data-section="achievements">
                <h2 class="sidebar-section-title" id="section-key-achievements">Principais Conquistas</h2>
                <div id="key-achievements">
                    <!-- Populated by JavaScript -->
                </div>
            </section>
            
            <section class="sidebar-section" data-section="education">
                <h2 class="sidebar-section-title" id="section-education">Formação</h2>
                <div id="education">
                    <!-- Populated by JavaScript -->
                </div>
            </section>
            
            <section class="sidebar-section" data-section="languages">
                <h2 class="sidebar-section-title" id="section-languages">Idiomas</h2>
                <div id="languages">
                    <!-- Populated by JavaScript -->
                </div>
            </section>
            
            <section class="sidebar-section" data-section="projects">
                <h2 class="sidebar-section-title" id="section-projects">Projetos</h2>
                <div id="projects">
                    <!-- Populated by JavaScript -->
                </div>

            <section class="sidebar-section" data-section="hobbies">
                <h2 class="sidebar-section-title" id="section-hobbies">Hobbies</h2>

                    <!-- Populated by JavaScript -->
                </ul>
            </section>
        </aside>
        
        <!-- Right Main Content -->
        <main class="main-content">
            <!-- Header (sticky on top in mobile, normal on desktop) -->
            <header class="header-section">
                <h1 class="name" id="name">Marcelo Mourão</h1>
                <div class="tagline" id="tagline">Desenvolvedor Sênior e Arquiteto de Software</div>
            </header>
            
            <section class="work-experience-section" data-section="experience">
                <h2 class="section-title" id="section-work">Experiência Profissional</h2>
                <div id="work-experience">
                    <!-- Populated by JavaScript -->
                </div>
            </section>
        </main>
    </div>
    
    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <div class="mobile-nav-items">
            <div class="mobile-nav-item active" data-section="about" onclick="showSection('about')">
                <i class="bi bi-person"></i>
                <span id="mobile-nav-about">Sobre</span>
            </div>
            <div class="mobile-nav-item" data-section="tech" onclick="showSection('tech')">
                <i class="bi bi-code-slash"></i>
                <span id="mobile-nav-tech">Tech</span>
            </div>
            <div class="mobile-nav-item" data-section="education" onclick="showSection('education')">
                <i class="bi bi-mortarboard"></i>
                <span id="mobile-nav-education">Formação</span>
            </div>
            <div class="mobile-nav-item" data-section="projects" onclick="showSection('projects')">
                <i class="bi bi-folder"></i>
                <span id="mobile-nav-projects">Projetos</span>
            </div>
            <div class="mobile-nav-item" data-section="experience" onclick="showSection('experience')">
                <i class="bi bi-briefcase"></i>
                <span id="mobile-nav-experience">Experiência</span>
            </div>
        </div>
    </nav>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript Files -->
    <script src="js/themes.js"></script>
    <script src="js/templates.js"></script>
    <script>
        let cvData = null;
        let descriptions = null;
        let currentLang = 'pt';

        function detectLanguage() {
            const params = new URLSearchParams(window.location.search);
            const langParam = params.get('language');
            
            if (langParam === 'pt' || langParam === 'en') {
                return langParam;
            }
            
            const browserLang = navigator.language || navigator.userLanguage;
            if (browserLang.startsWith('pt')) {
                return 'pt';
            }
            return 'en';
        }

        async function loadData() {
            try {
                const [dataResponse, descResponse] = await Promise.all([
                    fetch('cv-data.json'),
                    fetch(`cv-descriptions-${currentLang}.json`)
                ]);
                
                cvData = await dataResponse.json();
                descriptions = await descResponse.json();
                
                renderCV();
            } catch (error) {
                console.error('Error loading CV data:', error);
            }
        }

        function switchLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
            updateLanguageButtons();
            ThemeManager.updateLanguage(lang);
            loadData();
        }

        function updateLanguageButtons() {
            document.getElementById('lang-pt').classList.toggle('active', currentLang === 'pt');
            document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
        }

        function toggleShareMenu() {
            const menu = document.getElementById('share-menu');
            menu.classList.toggle('show');
        }

        function shareViaWhatsApp(event) {
            event.preventDefault();
            const menu = document.getElementById('share-menu');
            menu.classList.remove('show');
            
            try {
                const phoneNumber = cvData.personal.phone.replace(/[\s\-+]/g, '');
                const message = descriptions.messages.whatsapp;
                const text = encodeURIComponent(message);
                window.open(`https://wa.me/${phoneNumber}?text=${text}`, '_blank');
            } catch (error) {
                console.error('Error sharing via WhatsApp:', error);
            }
        }
        
        async function shareViaEmail(event) {
            event.preventDefault();
            const menu = document.getElementById('share-menu');
            menu.classList.remove('show');
            
            try {
                const subject = encodeURIComponent(descriptions.messages.email.subject);
                const body = encodeURIComponent(descriptions.messages.email.body);
                window.location.href = `mailto:?subject=${subject}&body=${body}`;
            } catch (error) {
                console.error('Error sharing via email:', error);
            }
        }
        
        function shareViaLinkedIn(event) {
            event.preventDefault();
            const menu = document.getElementById('share-menu');
            menu.classList.remove('show');
            
            const url = encodeURIComponent(window.location.href);
            window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`, '_blank');
        }
        
        // Simplified section toggle - apenas adiciona/remove classe active
        function showSection(sectionName) {
            // Remove active de todos os nav items
            document.querySelectorAll('.mobile-nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // Remove active de todas as seções
            document.querySelectorAll('.sidebar-section, .work-experience-section, .profile-section, .contact-section').forEach(sec => {
                sec.classList.remove('active');
            });
            
            // Remover headers mobile duplicados
            document.querySelectorAll('.mobile-header-section').forEach(header => {
                header.remove();
            });
            
            // Adiciona active no nav item correspondente
            const navItem = document.querySelector(`.mobile-nav-item[data-section="${sectionName}"]`);
            if (navItem) {
                navItem.classList.add('active');
            }
            
            // Mapeamento de seções mobile
            if (sectionName === 'about') {
                // About: profile + contact + summary
                const profileSection = document.querySelector('.profile-section');
                const contactSection = document.querySelector('.contact-section');
                if (profileSection) {
                    profileSection.classList.add('active');
                    // Adicionar header no topo
                    addMobileHeader(profileSection);
                }
                if (contactSection) contactSection.classList.add('active');
                const summarySection = document.querySelector('[data-section="summary"]');
                if (summarySection) summarySection.classList.add('active');
            } else if (sectionName === 'tech') {
                // Tech: skills + achievements
                const skillsSection = document.querySelector('[data-section="skills"]');
                const achievementsSection = document.querySelector('[data-section="achievements"]');
                if (skillsSection) {
                    skillsSection.classList.add('active');
                    addMobileHeader(skillsSection);
                }
                if (achievementsSection) achievementsSection.classList.add('active');
            } else if (sectionName === 'education') {
                // Education: education + languages
                const educationSection = document.querySelector('[data-section="education"]');
                const languagesSection = document.querySelector('[data-section="languages"]');
                if (educationSection) {
                    educationSection.classList.add('active');
                    addMobileHeader(educationSection);
                }
                if (languagesSection) languagesSection.classList.add('active');
            } else if (sectionName === 'projects') {
                // Projects: projects + hobbies
                const projectsSection = document.querySelector('[data-section="projects"]');
                const hobbiesSection = document.querySelector('[data-section="hobbies"]');
                if (projectsSection) {
                    projectsSection.classList.add('active');
                    addMobileHeader(projectsSection);
                }
                if (hobbiesSection) hobbiesSection.classList.add('active');
            } else if (sectionName === 'experience') {
                // Experience: work experience
                const experienceSection = document.querySelector('[data-section="experience"]');
                if (experienceSection) experienceSection.classList.add('active');
                // Header já está no main-content para experiência
            }
        }
        
        function addMobileHeader(section) {
            // Criar header duplicado
            const header = document.createElement('header');
            header.className = 'mobile-header-section';
            const nameEl = document.getElementById('name');
            const taglineEl = document.getElementById('tagline');
            if (nameEl && taglineEl) {
                header.innerHTML = `
                    <h1 class="name">${nameEl.textContent}</h1>
                    <div class="tagline">${taglineEl.textContent}</div>
                `;
                section.parentNode.insertBefore(header, section);
            }
        }

        function renderCV() {
            if (!cvData || !descriptions) return;

            const pageTitle = descriptions.seo ? descriptions.seo.title : (currentLang === 'pt' ? 'Currículo - Marcelo Mourão' : 'Resume - Marcelo Mourão');
            const pageDescription = descriptions.seo ? descriptions.seo.description : (currentLang === 'pt' ? 'Desenvolvedor Sênior e Arquiteto de Software com mais de 15 anos de experiência' : 'Senior Developer and Software Architect with over 15 years of experience');
            
            document.getElementById('page-title').textContent = pageTitle;
            
            const ogTitle = document.getElementById('og-title');
            const ogDescription = document.getElementById('og-description');
            const twitterTitle = document.getElementById('twitter-title');
            const twitterDescription = document.getElementById('twitter-description');
            const metaDescription = document.getElementById('meta-description');
            
            if (ogTitle) ogTitle.setAttribute('content', pageTitle);
            if (ogDescription) ogDescription.setAttribute('content', pageDescription);
            if (twitterTitle) twitterTitle.setAttribute('content', pageTitle);
            if (twitterDescription) twitterDescription.setAttribute('content', pageDescription);
            if (metaDescription) metaDescription.setAttribute('content', pageDescription);

            // Header
            document.getElementById('name').textContent = cvData.personal.name;
            document.getElementById('tagline').textContent = cvData.personal.tagline[currentLang];
            document.getElementById('profile-image').src = cvData.personal.photo;

            // Contact list
            const phoneNumber = cvData.personal.phone.replace(/[\s\-+]/g, '');
            const whatsappMessage = encodeURIComponent(descriptions.messages.whatsapp);
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${whatsappMessage}`;
            
            const emailSubject = encodeURIComponent(descriptions.messages.email.subject);
            const emailBody = encodeURIComponent(descriptions.messages.email.body);
            const emailUrl = `mailto:${cvData.personal.email}?subject=${emailSubject}&body=${emailBody}`;
            
            const contactHTML = `
                <li class="contact-item"><i class="bi bi-geo-alt"></i><span>${cvData.personal.location[currentLang]}</span></li>
                <li class="contact-item">
                    <a href="${whatsappUrl}" target="_blank">
                        <i class="bi bi-telephone"></i>
                        <i class="bi bi-whatsapp"></i>
                        <span>${cvData.personal.phone}</span>
                    </a>
                </li>
                <li class="contact-item">
                    <a href="${emailUrl}">
                        <i class="bi bi-envelope"></i>
                        <span>${cvData.personal.email}</span>
                    </a>
                </li>
                <li class="contact-item"><a href="${cvData.personal.linkedin}" target="_blank"><i class="bi bi-linkedin"></i> <span>linkedin.com/in/msmourao</span></a></li>
                <li class="contact-item"><a href="${cvData.personal.github}" target="_blank"><i class="bi bi-github"></i> <span>github.com/msmourao</span></a></li>
            `;
            
            document.getElementById('contact-list').innerHTML = contactHTML;

            // Sections titles
            document.getElementById('section-summary').textContent = descriptions.sections.summary;
            document.getElementById('section-key-achievements').textContent = descriptions.sections.keyAchievements;
            document.getElementById('section-work').textContent = descriptions.sections.workExperience;
            document.getElementById('section-tech').textContent = descriptions.sections.techStack;
            document.getElementById('section-education').textContent = descriptions.sections.education;
            document.getElementById('section-languages').textContent = descriptions.sections.languages;
            document.getElementById('section-projects').textContent = descriptions.sections.projects;
            document.getElementById('section-hobbies').textContent = descriptions.sections.hobbies;
            
            if (descriptions.buttons) {
                const shareButton = document.getElementById('share-button-title');
                const printButton = document.getElementById('print-button-title');
                const whatsappLabel = document.getElementById('share-whatsapp-label');
                const emailLabel = document.getElementById('share-email-label');
                const linkedinLabel = document.getElementById('share-linkedin-label');
                
                if (shareButton) shareButton.title = descriptions.buttons.share;
                if (printButton) printButton.title = descriptions.buttons.print;
                if (whatsappLabel && descriptions.buttons.shareOptions) whatsappLabel.textContent = descriptions.buttons.shareOptions.whatsapp;
                if (emailLabel && descriptions.buttons.shareOptions) emailLabel.textContent = descriptions.buttons.shareOptions.email;
                if (linkedinLabel && descriptions.buttons.shareOptions) linkedinLabel.textContent = descriptions.buttons.shareOptions.linkedin;
            }

            // Summary
            document.getElementById('summary-text').textContent = descriptions.about;

            // Tech stack
            const techStack = document.getElementById('tech-stack');
            techStack.innerHTML = cvData.techStack.map(tech => 
                `<li>${tech}</li>`
            ).join('');

            // Mobile navigation labels
            const navLabels = currentLang === 'pt' 
                ? { about: 'Sobre', tech: 'Tech', education: 'Formação', projects: 'Projetos', experience: 'Experiência' }
                : { about: 'About', tech: 'Tech', education: 'Education', projects: 'Projects', experience: 'Experience' };
            document.getElementById('mobile-nav-about').textContent = navLabels.about;
            document.getElementById('mobile-nav-tech').textContent = navLabels.tech;
            document.getElementById('mobile-nav-education').textContent = navLabels.education;
            document.getElementById('mobile-nav-projects').textContent = navLabels.projects;
            document.getElementById('mobile-nav-experience').textContent = navLabels.experience;

            // Key Achievements
            if (descriptions.keyAchievements) {
                const keyAchievementsHTML = descriptions.keyAchievements.map(achievement => `
                    <div class="key-achievement-item">
                        <i class="bi ${achievement.icon} key-achievement-icon"></i>
                        <div class="key-achievement-content">
                            <h4>${achievement.title}</h4>
                            <p>${achievement.description}</p>
                        </div>
                    </div>
                `).join('');
                document.getElementById('key-achievements').innerHTML = keyAchievementsHTML;
            }

            // Function to convert date to MM/yyyy format
            function formatDateToMMYYYY(dateStr, lang) {
                const monthMapPt = {
                    'janeiro': '01', 'fevereiro': '02', 'março': '03', 'abril': '04',
                    'maio': '05', 'junho': '06', 'julho': '07', 'agosto': '08',
                    'setembro': '09', 'outubro': '10', 'novembro': '11', 'dezembro': '12'
                };
                const monthMapEn = {
                    'january': '01', 'february': '02', 'march': '03', 'april': '04',
                    'may': '05', 'june': '06', 'july': '07', 'august': '08',
                    'september': '09', 'october': '10', 'november': '11', 'december': '12'
                };
                
                const monthMap = lang === 'pt' ? monthMapPt : monthMapEn;
                const present = lang === 'pt' ? 'Presente' : 'Present';
                
                if (dateStr.includes('–') || dateStr.includes('—') || dateStr.includes('-')) {
                    const separator = dateStr.includes('–') ? '–' : (dateStr.includes('—') ? '—' : '-');
                    const parts = dateStr.split(separator).map(s => s.trim());
                    
                    const formatPart = (part) => {
                        if (part.toLowerCase() === present.toLowerCase()) {
                            return lang === 'pt' ? 'Presente' : 'Present';
                        }
                        const words = part.toLowerCase().split(' ');
                        if (words.length >= 2) {
                            const month = words[0];
                            const year = words[1];
                            const monthNum = monthMap[month] || month;
                            return `${monthNum}/${year}`;
                        }
                        return part;
                    };
                    
                    return `${formatPart(parts[0])} - ${formatPart(parts[1])}`;
                }
                
                return dateStr;
            }

            // Work experience
            const workExp = document.getElementById('work-experience');
            workExp.innerHTML = cvData.workExperience.map(job => {
                const jobDesc = descriptions.workExperience[job.key];
                if (!jobDesc) return '';
                
                const location = job.location ? job.location[currentLang] : '';
                const formattedPeriod = formatDateToMMYYYY(job.period[currentLang], currentLang);
                
                return `
                    <article class="timeline-item">
                        <div class="timeline-header">
                            <div class="timeline-header-row">
                                <div class="timeline-header-left">
                                    <h3 class="timeline-title">${job.title[currentLang]}</h3>
                                </div>
                                <div class="timeline-header-right">
                                    <div class="timeline-period">${formattedPeriod}</div>
                                </div>
                            </div>
                            <div class="timeline-header-row">
                                <div class="timeline-header-left">
                                    <div class="timeline-company">${typeof job.company === 'object' ? job.company[currentLang] : job.company}</div>
                                </div>
                                <div class="timeline-header-right">
                                    ${location ? `<div class="timeline-location"><i class="bi bi-geo-alt-fill"></i> ${location}</div>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="timeline-content">
                            <p>${jobDesc.description}</p>
                            <ul>
                                ${jobDesc.bullets.map(bullet => `<li>${bullet}</li>`).join('')}
                            </ul>
                            <div class="technologies-box">
                                <strong>${currentLang === 'pt' ? 'Tecnologias e ferramentas:' : 'Technologies and tools:'}</strong> ${jobDesc.technologies}
                            </div>
                        </div>
                    </article>
                `;
            }).join('');

            // Education
            const education = document.getElementById('education');
            education.innerHTML = cvData.education.map(edu => `
                <div class="education-item">
                    <div class="education-title">${edu.title[currentLang]}</div>
                    <div class="education-institution">${edu.institution}</div>
                    <div class="education-period">${edu.period[currentLang]}</div>
                    ${edu.note ? `<div class="education-period" style="font-style: italic; margin-top: 0.25rem;">${edu.note[currentLang]}</div>` : ''}
                </div>
            `).join('');

            // Languages
            const languages = document.getElementById('languages');
            languages.innerHTML = cvData.languages.map(lang => {
                const dots = Array(5).fill(0).map((_, i) => 
                    `<div class="language-dot ${i < lang.dots ? 'filled' : ''}"></div>`
                ).join('');
                
                return `
                    <div class="language-item">
                        <div class="language-info">
                            <div class="language-name">${lang.name[currentLang]}</div>
                            <div class="language-level">${lang.level[currentLang]}</div>
                        </div>
                        <div class="language-dots">${dots}</div>
                    </div>
                `;
            }).join('');

            // Projects
            const projects = document.getElementById('projects');
            projects.innerHTML = cvData.projects.map(proj => {
                const projDesc = descriptions.projects[proj.key];
                if (!projDesc) return '';
                
                return `
                    <div class="project-item">
                        <div class="project-title">${projDesc.name}</div>
                        <div class="project-description">${projDesc.description}</div>
                    </div>
                `;
            }).join('');

            // Hobbies
            const hobbies = document.getElementById('hobbies');
            hobbies.innerHTML = cvData.hobbies.map(hobby => 
                `<li>${hobby[currentLang]}</li>`
            ).join('');
            
            // Mobile será inicializado pela função loadData wrapper
        }

        // Ensure content is rendered before print
        window.addEventListener('beforeprint', function() {
            if (!cvData || !descriptions) {
                loadData();
            } else {
                renderCV();
            }
        });

        // Initialize
        currentLang = detectLanguage();
        document.documentElement.lang = currentLang === 'pt' ? 'pt-BR' : 'en';
        updateLanguageButtons();
        
        // Initialize Theme Manager
        ThemeManager.init(currentLang);
        
        // Load data and initialize
        (async () => {
            await loadData();
            initializeMobile();
        })();
        
        // Função para inicializar mobile
        // Handle print with image preloading
        function handlePrint() {
            const profileImage = document.getElementById('profile-image');
            if (profileImage) {
                // Garantir que o src está correto
                const currentSrc = profileImage.src || profileImage.getAttribute('src') || 'marcelo.png';
                profileImage.src = currentSrc;
                profileImage.setAttribute('src', 'marcelo.png');
                
                // Forçar carregamento da imagem
                const img = new Image();
                img.onload = function() {
                    // Garantir que a imagem está visível
                    profileImage.style.display = 'block';
                    profileImage.style.visibility = 'visible';
                    profileImage.style.opacity = '1';
                    profileImage.src = 'marcelo.png';
                    
                    // Aguardar renderização antes de imprimir
                    setTimeout(() => {
                        window.print();
                    }, 200);
                };
                img.onerror = function() {
                    // Mesmo se der erro, força o src e tenta imprimir
                    profileImage.src = 'marcelo.png';
                    profileImage.setAttribute('src', 'marcelo.png');
                    profileImage.style.display = 'block';
                    profileImage.style.visibility = 'visible';
                    profileImage.style.opacity = '1';
                    setTimeout(() => {
                        window.print();
                    }, 200);
                };
                img.src = 'marcelo.png';
            } else {
                window.print();
            }
        }

        function initializeMobile() {
            if (window.innerWidth <= 768) {
                // Ocultar todas as seções primeiro
                document.querySelectorAll('.sidebar-section, .profile-section, .contact-section, .work-experience-section').forEach(sec => {
                    sec.classList.remove('active');
                });
                // Mostrar seção about
                showSection('about');
            }
        }
        
        // Inicializar quando DOM estiver pronto (se template já carregou)
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                // Mobile será inicializado quando template carregar
            });
        } else {
            // DOM já está pronto, mas aguardar template
        }
        
        // Listener de resize para mobile
        window.addEventListener('resize', function() {
            if (window.innerWidth <= 768) {
                const hasActive = document.querySelector('.sidebar-section.active, .profile-section.active');
                if (!hasActive) {
                    showSection('about');
                }
            }
        });
    </script>
</body>
</html>
